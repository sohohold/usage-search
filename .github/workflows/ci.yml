name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Index a small subset of Aozora Bunko (50 works)
      - name: Build index (50 works)
        run: npx tsx scripts/build-index.ts --limit 50
        env:
          DB_PATH: ./data/aozora.db
          DATA_DIR: ./data

      - name: Verify database exists
        run: |
          ls -lh data/aozora.db
          echo "--- DB stats ---"
          sqlite3 data/aozora.db "SELECT count(*) || ' works' FROM works; SELECT count(*) || ' chunks' FROM chunks;"

      # Start Next.js dev server using local SQLite via libsql file: URL
      - name: Start server
        run: npm run dev &
        env:
          TURSO_DATABASE_URL: file:./data/aozora.db
          PORT: "3000"

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/stats > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Test /api/stats
        run: |
          STATS=$(curl -sf http://localhost:3000/api/stats)
          echo "$STATS"
          echo "$STATS" | jq -e '.works > 0 and .chunks > 0'

      - name: Test /api/search
        run: |
          # Search for a common word (trigram FTS5 requires 3+ chars)
          RESULT=$(curl -sf "http://localhost:3000/api/search?q=%E3%81%AE%E4%B8%AD%E3%81%AB&limit=5")
          echo "$RESULT" | jq .
          echo "$RESULT" | jq -e '.results | length > 0'

      - name: Test short query rejection
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3000/api/search?q=ab")
          [ "$STATUS" = "400" ] && echo "Correctly rejected 2-char query" || exit 1
