name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---- Backend ----
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit -p tsconfig.json

      - name: Type-check scripts
        working-directory: backend
        run: npx tsc --noEmit --esModuleInterop --module NodeNext --moduleResolution NodeNext scripts/build-index.ts scripts/aozora.ts

      # ---- Frontend ----
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Index a small subset of Aozora Bunko (50 works)
      - name: Build index (50 works)
        working-directory: backend
        run: npx tsx scripts/build-index.ts --limit 50
        env:
          DB_PATH: ../data/aozora.db
          DATA_DIR: ../data

      - name: Verify database exists
        run: |
          ls -lh data/aozora.db
          echo "--- DB stats ---"
          sqlite3 data/aozora.db "SELECT count(*) || ' works' FROM works; SELECT count(*) || ' chunks' FROM chunks;"

      # Start backend and run search tests
      - name: Start backend
        working-directory: backend
        run: npx tsx src/index.ts &
        env:
          DB_PATH: ../data/aozora.db
          PORT: "3001"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 1
          done

      - name: Test /api/stats
        run: |
          STATS=$(curl -sf http://localhost:3001/api/stats)
          echo "$STATS"
          echo "$STATS" | jq -e '.works > 0 and .chunks > 0'

      - name: Test /api/search
        run: |
          # Search for a common word
          RESULT=$(curl -sf "http://localhost:3001/api/search?q=%E3%81%AE%E4%B8%AD&limit=5")
          echo "$RESULT" | jq .
          echo "$RESULT" | jq -e '.results | length > 0'

      - name: Test short query rejection
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3001/api/search?q=a")
          [ "$STATUS" = "400" ] && echo "Correctly rejected 1-char query" || exit 1

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t aozora-backend ./backend

      - name: Build indexer image
        run: docker build -f ./backend/Dockerfile.indexer -t aozora-indexer ./backend

      - name: Build frontend image
        run: docker build -t aozora-frontend ./frontend
